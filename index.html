<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        .value {
            font-size: 30px;
            font-weight: bold;
            color: #0078ff;
        }
    </style>
</head>
<body>

<h1>My Dashboard</h1>

<div class="container">
    <div class="card">
        <h3>Sales</h3>
        <div class="value">150</div>
    </div>

    <div class="card">
        <h3>Users</h3>
        <div class="value">87</div>
    </div>

    <div class="card">
        <h3>Orders</h3>
        <div class="value">42</div>
    </div>
</div>

</body>
</html>
